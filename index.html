<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Browser</title>

  <!-- Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <!-- Syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css">
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-go.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-kotlin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-jsx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-tsx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-docker.min.js"></script>
  <!-- Mermaid for flow diagrams -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  <style>
    :root {
      /* GitHub Dark palette */
      --bg: #0d1117;
      --panel: #161b22;
      --panel2: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #1f6feb;
      --hover: rgba(177,186,196,0.12);
      --selected: rgba(56,139,253,0.15);
      --selected-border: rgba(56,139,253,0.4);
      --danger: #f85149;
      --success: #3fb950;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
                   Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
                   "Liberation Mono", monospace;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Top toolbar ── */
    .toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }
    .toolbar button {
      background: var(--panel2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 5px 12px;
      font: inherit; font-size: 13px; font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .toolbar button:hover { background: #30363d; border-color: var(--muted); }
    .toolbar button:active { background: var(--panel); }
    .toolbar .root-name {
      font-weight: 600; color: var(--accent);
      margin-left: 8px; flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-size: 13px;
    }
    .toolbar input[type="search"] {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 6px; font: inherit; font-size: 13px;
      width: 220px;
    }
    .toolbar input[type="search"]:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,166,255,0.25);
    }
    .toolbar label { font-size: 12px; }
    .stat { color: var(--muted); font-size: 12px; }

    /* ── Main split ── */
    .main { flex: 1 1 auto; display: flex; min-height: 0; }
    .sidebar {
      width: 340px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow: auto;
      flex: 0 0 auto;
      resize: horizontal;
    }
    .content { flex: 1 1 auto; overflow: auto; padding: 0; min-width: 0; background: var(--bg); }

    /* ── Tree ── */
    .tree { padding: 8px 0; }
    .tree ul { list-style: none; margin: 0; padding-left: 16px; }
    .tree > ul { padding-left: 8px; }
    .row {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 8px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      border-radius: 6px;
      font-size: 13px;
      margin-right: 8px;
    }
    .row:hover { background: var(--hover); }
    .row.selected {
      background: var(--selected);
      box-shadow: inset 2px 0 0 var(--accent);
    }
    .row.hidden { display: none; }
    .row .twirl {
      width: 12px; display: inline-block; text-align: center;
      color: var(--muted); font-size: 10px;
    }
    .row .icon { width: 16px; display: inline-block; text-align: center; font-size: 13px; }
    .row .name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .row.dir > .icon { color: #dcb67a; }
    .row.file > .icon { color: var(--muted); }
    .row .badge {
      background: var(--panel2); color: var(--muted);
      font-size: 11px; padding: 0 7px; border-radius: 12px;
      margin-left: 6px;
    }

    /* ── Content viewer ── */
    .viewer { padding: 24px 32px; }
    .viewer .path-bar {
      font-size: 12px; color: var(--muted);
      padding: 8px 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 16px;
      word-break: break-all;
    }
    .viewer .path-bar .name { color: var(--text); font-weight: 600; }
    .viewer pre {
      margin: 0;
      background: var(--panel) !important;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px !important;
      overflow: auto;
      max-height: calc(100vh - 160px);
      line-height: 1.45;
    }
    .viewer code { font-family: var(--font-mono); font-size: 85%; }
    /* Prism's default theme adds a white text-shadow that looks like an outline
       on dark backgrounds. Strip it across every Prism-styled element + tokens. */
    .viewer pre,
    .viewer pre *,
    .viewer code,
    .viewer code * { text-shadow: none !important; }
    .viewer pre[class*="language-"] { background: var(--panel) !important; color: var(--text); }
    .viewer code[class*="language-"] { color: var(--text); }
    .viewer img, .viewer video {
      max-width: 100%; max-height: calc(100vh - 140px);
      display: block; margin: 0 auto;
      background: #000; border: 1px solid var(--border);
    }
    .viewer iframe {
      width: 100%; height: calc(100vh - 140px);
      border: 1px solid var(--border); background: white;
    }
    .viewer .markdown {
      max-width: 1100px;
      line-height: 1.65;
      font-size: 15px;
      overflow-wrap: break-word;
    }
    .width-narrow .markdown { max-width: 760px; }
    .width-wide .markdown   { max-width: 1100px; }
    .width-full .markdown   { max-width: none; }
    .viewer .markdown > *:first-child { margin-top: 0; }
    .viewer .markdown h1, .viewer .markdown h2 {
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
      font-weight: 600;
    }
    .viewer .markdown h1 { font-size: 1.6em; margin: 24px 0 12px; }
    .viewer .markdown h2 { font-size: 1.3em; margin: 22px 0 10px; }
    .viewer .markdown h3 { font-size: 1.1em; margin: 18px 0 8px; font-weight: 600; }
    .viewer .markdown h4 { font-size: 1em; margin: 16px 0 6px; font-weight: 600; }
    .viewer .markdown h5 { font-size: 0.95em; margin: 14px 0 6px; font-weight: 600; color: var(--muted); }
    .viewer .markdown h6 { font-size: 0.9em; margin: 14px 0 6px; font-weight: 600; color: var(--muted); }
    .viewer .markdown p { margin: 0 0 14px; }
    .viewer .markdown ul, .viewer .markdown ol { margin: 0 0 14px; padding-left: 24px; }
    /* Nested lists get a faint left guide so deeply-nested content (typical
       in YAML-shaped test files) is easier to follow. */
    .viewer .markdown ul ul, .viewer .markdown ul ol,
    .viewer .markdown ol ul, .viewer .markdown ol ol {
      margin: 6px 0 6px;
      border-left: 2px solid var(--border);
      padding-left: 16px; padding-top: 2px;
    }
    .viewer .markdown li { margin: 6px 0; }
    .viewer .markdown li > p { margin: 6px 0; }
    .viewer .markdown li > p:first-child { margin-top: 0; }
    .viewer .markdown li > p:last-child { margin-bottom: 0; }
    /* Hard line-breaks (from breaks:true) on a list item should sit close
       to the bullet so the bullet still feels attached to the line. */
    .viewer .markdown li br { line-height: 1.4; }
    .viewer .markdown a { color: var(--accent); text-decoration: none; }
    .viewer .markdown a:hover { text-decoration: underline; }
    .viewer .markdown table {
      border-collapse: collapse; margin: 12px 0;
      display: block; overflow: auto; max-width: 100%;
    }
    .viewer .markdown th, .viewer .markdown td {
      border: 1px solid var(--border); padding: 6px 14px;
    }
    .viewer .markdown th { background: var(--panel); font-weight: 600; }
    .viewer .markdown tr:nth-child(2n) td { background: rgba(110,118,129,0.08); }
    .viewer .markdown code {
      background: rgba(110,118,129,0.16);
      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 85%;
    }
    .viewer .markdown pre {
      background: var(--panel) !important;
      border-radius: 6px;
      padding: 16px !important;
      margin: 0 0 16px;
      line-height: 1.45;
    }
    .viewer .markdown pre code {
      background: transparent; padding: 0;
      font-size: 85%;
    }
    .viewer .markdown blockquote {
      border-left: 4px solid var(--border);
      padding: 0 16px;
      color: var(--muted);
      margin: 0 0 16px;
    }
    .viewer .markdown hr {
      border: 0; border-top: 1px solid var(--border);
      margin: 24px 0; height: 0;
    }
    .viewer .markdown img { max-width: 100%; border-radius: 6px; }

    .empty {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--muted);
      flex-direction: column; gap: 12px;
      font-size: 14px;
    }
    .empty .hint { font-size: 13px; max-width: 420px; text-align: center; line-height: 1.6; }

    /* ── Submit-review modal ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: min(560px, 92vw);
      max-height: 86vh;
      display: flex; flex-direction: column;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    .modal .head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal .head .title { font-weight: 600; font-size: 14px; }
    .modal .head .close {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 20px; line-height: 1; padding: 0 4px;
    }
    .modal .body { padding: 14px 18px; }
    .modal .body label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .modal textarea {
      width: 100%; box-sizing: border-box;
      min-height: 120px;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border);
      font: inherit; font-size: 13px; line-height: 1.5;
      padding: 8px 10px; border-radius: 6px; resize: vertical;
    }
    .modal textarea:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,166,255,0.25);
    }
    .modal .actions {
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center;
    }
    .modal .actions .err { color: var(--danger); font-size: 12px; flex: 1; }
    .modal .actions button {
      background: var(--panel2); color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 14px; font: inherit; font-size: 13px; font-weight: 500;
      border-radius: 6px; cursor: pointer;
    }
    .modal .actions button:hover { background: #30363d; border-color: var(--muted); }
    .modal .actions button.approve { background: #238636; color: #fff; border-color: rgba(240,246,252,0.1); }
    .modal .actions button.approve:hover { background: #2ea043; }
    .modal .actions button.request-changes { background: #da3633; color: #fff; border-color: rgba(240,246,252,0.1); }
    .modal .actions button.request-changes:hover { background: #f85149; }
    .modal .actions button:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Loading screen ── */
    @keyframes mdb-spin { to { transform: rotate(360deg); } }
    @keyframes mdb-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .loading-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%;
      gap: 18px;
      padding: 0 24px;
      color: var(--muted);
    }
    .loading-screen .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: mdb-spin 0.8s linear infinite;
    }
    .loading-screen .title {
      font-size: 16px; color: var(--text); font-weight: 500;
      text-align: center;
    }
    .loading-screen .title code {
      background: var(--panel); padding: 2px 8px; border-radius: 6px;
      color: var(--accent); font-family: var(--font-mono); font-size: 13px;
      border: 1px solid var(--border);
    }
    .loading-screen .stage {
      font-size: 13px; color: var(--muted);
      max-width: 540px; text-align: center; line-height: 1.6;
    }
    .loading-screen .stage strong { color: var(--text); animation: mdb-pulse 1.2s ease-in-out infinite; }
    .loading-screen .footnote { font-size: 12px; color: var(--muted); opacity: 0.6; }

    .badge {
      display: inline-block;
      background: var(--panel2);
      color: var(--muted);
      font-size: 11px;
      padding: 0 7px;
      border-radius: 12px;
      margin-left: 6px;
    }

    /* ── Sticky h2 inside markdown (keep section context while scrolling) ── */
    .viewer .markdown h2 {
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 1;
    }

    /* ── TOC sidebar ── */
    .toc {
      position: fixed;
      top: 72px; right: 16px;
      width: 200px;
      max-height: calc(100vh - 96px);
      overflow: auto;
      padding: 14px 16px 14px 20px;
      border-left: 1px solid var(--border);
      font-size: 11px;
      background: var(--bg);
    }
    .toc .toc-head {
      font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .toc a {
      display: block; color: var(--text); text-decoration: none;
      padding: 2px 0; line-height: 1.4;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .toc a:hover { color: var(--accent); }
    .toc a.level-3 { padding-left: 12px; color: var(--muted); }
    .toc a.level-4 { padding-left: 24px; color: var(--muted); font-size: 10px; }
    /* When the TOC is visible, leave room on the right so content doesn't slide under it.
       Only matters in Full mode — Narrow/Wide already cap content width. */
    .width-full .viewer.has-toc { padding-right: 260px; }
    @media (max-width: 1100px) { .toc { display: none; } .width-full .viewer.has-toc { padding-right: 32px; } }

    /* ── Inline comment buttons on rendered markdown blocks ── */
    .viewer .markdown [data-md-line] { position: relative; }
    .viewer .markdown .md-add-comment {
      position: absolute;
      right: -48px; top: 2px;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--accent);
      border-radius: 3px;
      cursor: pointer;
      padding: 0; font-size: 12px;
      opacity: 0;
      transition: opacity 0.1s;
    }
    .viewer .markdown [data-md-line]:hover > .md-add-comment,
    .viewer .markdown .md-add-comment:focus { opacity: 1; }
    .viewer .markdown .md-add-comment:hover { background: var(--accent); color: #000; }
    .viewer .markdown .md-block-extras {
      margin: 8px 0 12px;
    }

    /* ── Source/comment view (line-numbered, commentable gutter) ── */
    .source-view {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 12px;
      line-height: 1.55;
      margin: 0;
      max-height: calc(100vh - 140px);
      overflow: auto;
    }
    .src-line {
      display: grid;
      grid-template-columns: 56px 16px 1fr;
      gap: 4px; align-items: start;
      padding: 0 8px 0 0;
    }
    .src-line:hover { background: var(--hover); }
    .src-line .ln {
      color: var(--muted); text-align: right;
      user-select: none; padding-right: 6px;
      border-right: 1px solid var(--border);
    }
    .src-line.commentable .ln { color: #6cb6ff; cursor: pointer; }
    .src-line .add-comment {
      visibility: hidden;
      cursor: pointer; color: var(--accent);
      text-align: center; user-select: none;
      font-weight: 700;
    }
    .src-line.commentable:hover .add-comment { visibility: visible; }
    .src-line .src-content {
      white-space: pre-wrap; word-break: break-word;
      color: var(--text);
    }
    .src-extras { grid-column: 1 / -1; margin: 4px 0 8px 60px; }
    .src-comment-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 6px 10px;
      margin: 4px 0; border-radius: 3px;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 12px;
    }
    .src-comment-card .meta { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .src-comment-card .meta a { color: var(--accent); text-decoration: none; }
    .src-comment-card .body { white-space: pre-wrap; line-height: 1.5; }
    .composer {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      margin: 6px 0;
      font-family: var(--font-sans);
    }
    .composer textarea {
      width: 100%; min-height: 100px; box-sizing: border-box;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border);
      font-family: inherit; font-size: 13px; line-height: 1.5;
      padding: 8px 10px; border-radius: 6px; resize: vertical;
    }
    .composer textarea:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,166,255,0.25);
    }
    .composer .actions {
      margin-top: 10px;
      display: flex; gap: 8px; justify-content: flex-end; align-items: center;
    }
    .composer .err { color: var(--danger); font-size: 12px; flex: 1; }
    .composer button {
      background: var(--panel2); color: var(--text);
      border: 1px solid var(--border);
      padding: 5px 14px; font: inherit; font-size: 13px; font-weight: 500;
      border-radius: 6px; cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .composer button:hover { background: #30363d; border-color: var(--muted); }
    .composer button.primary {
      background: #238636; color: #fff;
      border-color: rgba(240,246,252,0.1);
    }
    .composer button.primary:hover { background: #2ea043; border-color: rgba(240,246,252,0.1); }
    .composer button.primary:disabled { background: #238636; opacity: 0.6; cursor: not-allowed; }

    /* ── Inline review comments at the bottom of a PR file ── */
    .review-comments {
      margin-top: 32px; padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .review-comments h3 { font-size: 1em; color: var(--text); margin: 0 0 12px; font-weight: 600; }
    .review-comments .rc {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 14px; margin-bottom: 10px;
    }
    .review-comments .rc-meta { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .review-comments .rc-meta a { color: var(--accent); text-decoration: none; }
    .review-comments .rc-meta a:hover { text-decoration: underline; }
    .review-comments .rc-body { font-size: 13px; line-height: 1.5; white-space: pre-wrap; }

    /* ── Content-search results ── */
    .results { padding: 8px 0; }
    .results .result {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      font-size: 13px;
    }
    .results .result:hover { background: var(--hover); }
    .results .result .path {
      color: var(--accent); font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .results .result .total { color: var(--muted); font-size: 11px; margin-left: 8px; font-weight: 400; }
    .results .result .snip {
      color: var(--muted); font-size: 12px;
      padding-left: 8px; margin-top: 4px;
      font-family: var(--font-mono);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .results .result .snip .ln { color: var(--muted); margin-right: 8px; }
    .results .result .snip mark {
      background: rgba(187,128,9,0.4); color: #f0883e;
      padding: 0 2px; border-radius: 3px;
    }
    .results .empty-msg { padding: 16px; color: var(--muted); font-size: 12px; text-align: center; }
  </style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <button id="nav-back" title="Previous file (⌘[)" disabled style="padding-left:10px;padding-right:10px;">←</button>
    <button id="nav-forward" title="Next file (⌘])" disabled style="padding-left:10px;padding-right:10px;">→</button>
    <button id="open-folder">📁 Open Folder</button>
    <button id="open-file">📄 Open File</button>
    <form id="load-form" style="display:flex;gap:6px;align-items:center;">
      <input type="text" id="load-input" placeholder="Load a PR / repo / path…"
             title="Paste owner/repo, owner/repo#N, a github.com URL, or a local path"
             style="background:var(--bg);color:var(--text);border:1px solid var(--border);padding:5px 10px;border-radius:6px;font:inherit;font-size:13px;width:280px;">
      <button type="submit" id="load-btn">Load</button>
    </form>
    <button id="refresh" hidden title="Re-scan the served folder for new/changed files">🔄 Refresh</button>
    <button id="open-on-github" hidden title="Open the current file on GitHub at this PR's head">↗ GitHub</button>
    <button id="toggle-mode" hidden title="Switch between rendered view and line-by-line source with inline review comments">💬 Comment mode</button>
    <button id="submit-review" hidden title="Submit a PR review (Approve / Request changes / Comment)">✅ Submit review</button>
    <button id="toggle-width" title="Cycle reading width (Wide → Full → Narrow)">↔ Wide</button>
    <span class="root-name" id="root-name">No folder open</span>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none;">
      <input type="checkbox" id="md-only" checked>
      Markdown only
    </label>
    <input type="search" id="filter" placeholder="Filter files...">
    <input type="search" id="content-search" placeholder="Search docs..." title="Full-text search across markdown files (served-folder mode only)">
    <span class="stat" id="stats"></span>
  </div>
  <div class="main">
    <aside class="sidebar">
      <div class="tree" id="tree"></div>
      <div class="results" id="results" hidden></div>
    </aside>
    <main class="content" id="content">
      <div class="empty">
        <div style="font-size:48px;">📂</div>
        <div>No file selected</div>
        <div class="hint">
          Click <strong>Open Folder</strong> to recursively browse a directory,
          or <strong>Open File</strong> for a single file.<br><br>
          <em>Tip:</em> open this app in Chrome / Edge for full folder support
          (uses the File System Access API).
        </div>
      </div>
    </main>
  </div>
</div>

<input type="file" id="hidden-file" hidden>

<script>
'use strict';

// ─── State ─────────────────────────────────────────────────────────────────
let rootHandle = null;          // FileSystemDirectoryHandle (folder mode)
let fileTree = null;            // full tree from buildTree()
let displayTree = null;         // tree currently rendered (may be md-pruned)
let selectedRow = null;         // currently-selected DOM row
let currentFilter = '';
let mdOnly = true;              // mirrors #md-only checkbox; default on
let serverContext = null;       // { github, prReviewComments } from tree.json
let currentPath = null;         // path of the file currently in the viewer
let currentText = null;         // raw text of the current file (for source-mode re-render)
let viewMode = 'rendered';      // 'rendered' | 'source' — toggled via toolbar in PR mode
// Browser-style file history: stack of served paths visited in this session.
let navHistory = [];
let navPos = -1;                // index of the currently-shown entry; -1 = none
let isNavigating = false;       // true while replaying a back/forward (suppresses re-push)

// Jira-style ticket pattern for auto-linking inside markdown.
const JIRA_RE = /\b([A-Z][A-Z0-9]+-\d{1,6})\b/g;
const JIRA_BASE = 'https://meesho.atlassian.net/browse/';

// ─── Extension → renderer + Prism language ─────────────────────────────────
const LANG_BY_EXT = {
  js: 'javascript', mjs: 'javascript', cjs: 'javascript',
  ts: 'typescript', tsx: 'tsx', jsx: 'jsx',
  py: 'python', go: 'go', java: 'java', kt: 'kotlin',
  rs: 'rust', c: 'c', cpp: 'cpp', h: 'c', hpp: 'cpp',
  sh: 'bash', bash: 'bash', zsh: 'bash',
  yml: 'yaml', yaml: 'yaml', json: 'json',
  css: 'css', scss: 'css', sass: 'css',
  sql: 'sql', dockerfile: 'docker',
  toml: 'ini', ini: 'ini', cfg: 'ini', env: 'bash', conf: 'ini',
  xml: 'markup', svg: 'markup',
};

const TEXT_EXTS = new Set([
  ...Object.keys(LANG_BY_EXT),
  'md', 'mdx', 'markdown', 'txt', 'log', 'gitignore', 'gitkeep', 'editorconfig',
  'lock', 'mod', 'sum', 'pem', 'crt', 'key', 'cql', 'jsonl', 'csv', 'tsv',
  'rst', 'adoc', 'org', 'tex', 'rb', 'php', 'pl', 'lua', 'r', 'jl',
  'service', 'ts', 'd.ts',
]);
const IMAGE_EXTS = new Set(['png','jpg','jpeg','gif','webp','svg','avif','bmp','ico']);
const VIDEO_EXTS = new Set(['mp4','webm','mov','m4v']);
const AUDIO_EXTS = new Set(['mp3','wav','ogg','m4a','flac']);
const PDF_EXTS = new Set(['pdf']);

// Files >5MB are not rendered as text
const TEXT_SIZE_LIMIT = 5 * 1024 * 1024;

// ─── Helpers ───────────────────────────────────────────────────────────────
function ext(name) {
  // Special case: files like 'Dockerfile', 'Makefile', '.gitignore'
  const base = name.toLowerCase();
  if (base === 'dockerfile' || base.endsWith('.dockerfile')) return 'dockerfile';
  if (base === 'makefile') return 'makefile';
  const dot = name.lastIndexOf('.');
  if (dot < 0) return '';
  return name.slice(dot + 1).toLowerCase();
}

function fileIcon(name) {
  const e = ext(name);
  if (IMAGE_EXTS.has(e)) return '🖼';
  if (VIDEO_EXTS.has(e)) return '🎞';
  if (AUDIO_EXTS.has(e)) return '🎵';
  if (PDF_EXTS.has(e)) return '📕';
  if (e === 'md' || e === 'markdown') return '📝';
  if (e === 'json') return '🟨';
  if (e === 'yml' || e === 'yaml') return '📋';
  if (e === 'html' || e === 'htm') return '🌐';
  if (name.toLowerCase() === 'dockerfile') return '🐳';
  return '📄';
}

function shouldSkip(name) {
  // Hide noise — but still allow them via filter override later.
  return name === '.DS_Store' || name === '__pycache__' || name === '.git'
      || name === 'node_modules' || name === '.next' || name === 'dist'
      || name === 'build' || name === '.venv' || name === 'venv';
}

// ─── Tree build ────────────────────────────────────────────────────────────
async function buildTree(handle, depth = 0) {
  const node = { name: handle.name, kind: 'directory', children: [], handle };
  try {
    for await (const [name, child] of handle.entries()) {
      if (shouldSkip(name)) continue;
      if (child.kind === 'directory') {
        node.children.push(await buildTree(child, depth + 1));
      } else {
        node.children.push({ name, kind: 'file', handle: child });
      }
    }
  } catch (e) {
    console.warn('Skipping (permission?):', handle.name, e);
  }
  // Sort: folders first, then alphabetical
  node.children.sort((a, b) => {
    if (a.kind !== b.kind) return a.kind === 'directory' ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
  return node;
}

function countLeaves(node) {
  if (node.kind === 'file') return 1;
  return node.children.reduce((s, c) => s + countLeaves(c), 0);
}

function isMarkdown(name) {
  const e = ext(name);
  return e === 'md' || e === 'markdown' || e === 'mdx';
}

// Return a *copy* of node with:
//   - file children kept only if they are .md
//   - directory children kept only if they (transitively) contain at least one .md
//   - returns null if node is a directory whose subtree has no .md at all
//   - returns the node itself if node is an .md file
//   - returns null if node is a non-md file
function pruneToMarkdown(node) {
  if (node.kind === 'file') {
    return isMarkdown(node.name) ? node : null;
  }
  const kept = [];
  for (const child of node.children) {
    const pruned = pruneToMarkdown(child);
    if (pruned) kept.push(pruned);
  }
  if (kept.length === 0) return null;
  return { ...node, children: kept };
}

// ─── Tree render ───────────────────────────────────────────────────────────
function renderTree(root) {
  const treeEl = document.getElementById('tree');
  treeEl.innerHTML = '';
  treeEl.appendChild(renderNode(root, true));
}

// Re-derive displayTree from fileTree based on the md-only toggle, then
// re-render. Updates the file-count stat to match what's actually shown.
function refreshTree() {
  if (!fileTree) return;
  if (mdOnly) {
    const pruned = pruneToMarkdown(fileTree);
    if (!pruned) {
      // Folder has no .md anywhere — show empty tree + a stat note.
      document.getElementById('tree').innerHTML = '';
      document.getElementById('stats').textContent =
        `0 .md files (full tree has ${countLeaves(fileTree)})`;
      return;
    }
    displayTree = pruned;
    document.getElementById('stats').textContent =
      `${countLeaves(pruned)} .md files (of ${countLeaves(fileTree)})`;
  } else {
    displayTree = fileTree;
    document.getElementById('stats').textContent = `${countLeaves(fileTree)} files`;
  }
  renderTree(displayTree);
  applyFilter();
}

function renderNode(node, isRoot = false) {
  const li = document.createElement('li');
  const row = document.createElement('div');
  row.className = `row ${node.kind === 'directory' ? 'dir' : 'file'}`;
  row.dataset.path = node.name;
  row.dataset.lower = node.name.toLowerCase();

  if (node.kind === 'directory') {
    // Expand every directory by default — like the GitHub repo view.
    const open = true;
    const twirl = document.createElement('span');
    twirl.className = 'twirl';
    twirl.textContent = open ? '▾' : '▸';
    row.appendChild(twirl);
    const icon = document.createElement('span');
    icon.className = 'icon';
    icon.textContent = open ? '📂' : '📁';
    row.appendChild(icon);
    const name = document.createElement('span');
    name.className = 'name';
    name.textContent = node.name;
    row.appendChild(name);
    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = countLeaves(node);
    row.appendChild(badge);
    li.appendChild(row);

    const ul = document.createElement('ul');
    if (!open) ul.style.display = 'none';
    for (const child of node.children) {
      ul.appendChild(renderNode(child, false));
    }
    li.appendChild(ul);

    row.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = ul.style.display !== 'none';
      ul.style.display = isOpen ? 'none' : '';
      twirl.textContent = isOpen ? '▸' : '▾';
      icon.textContent = isOpen ? '📁' : '📂';
    });
  } else {
    const twirl = document.createElement('span'); twirl.className = 'twirl';
    row.appendChild(twirl);
    const icon = document.createElement('span');
    icon.className = 'icon';
    icon.textContent = fileIcon(node.name);
    row.appendChild(icon);
    const name = document.createElement('span');
    name.className = 'name';
    name.textContent = node.name;
    row.appendChild(name);
    if (node.servedPath !== undefined) row.dataset.servedPath = node.servedPath;
    li.appendChild(row);

    row.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (selectedRow) selectedRow.classList.remove('selected');
      row.classList.add('selected');
      selectedRow = row;
      try {
        let file, displayPath;
        if (node.servedPath !== undefined) {
          // Served via HTTP by the mdbrowse CLI — fetch the bytes.
          const resp = await fetch('/' + node.servedPath);
          if (!resp.ok) throw new Error(`HTTP ${resp.status} for ${node.servedPath}`);
          const blob = await resp.blob();
          file = new File([blob], node.name, { type: blob.type });
          displayPath = node.servedPath;
        } else {
          file = await node.handle.getFile();
          displayPath = buildPath(node);
        }
        await renderFile(file, displayPath);
        if (!isNavigating) pushNavHistory(displayPath);
      } catch (err) {
        showError(err);
      }
    });
  }

  // Build a parent chain for path display
  if (isRoot) li._node = node;
  return wrapRoot(li, isRoot);
}

function wrapRoot(li, isRoot) {
  if (!isRoot) return li;
  const ul = document.createElement('ul');
  ul.appendChild(li);
  return ul;
}

function buildPath(node) {
  // Walk up the DOM to reconstruct the path
  let row = document.querySelector(`.row.selected`) || null;
  if (!row) return node.name;
  const parts = [];
  let el = row;
  while (el && el.tagName !== 'DIV') el = el.parentElement;
  while (el) {
    const li = el.closest('li');
    if (!li) break;
    const rowEl = li.querySelector(':scope > .row');
    if (rowEl) parts.unshift(rowEl.querySelector('.name').textContent);
    const parentUl = li.parentElement;
    if (!parentUl) break;
    el = parentUl.parentElement && parentUl.parentElement.tagName === 'LI'
       ? parentUl.parentElement
       : null;
  }
  return parts.join('/') || node.name;
}

// ─── Filter ────────────────────────────────────────────────────────────────
document.getElementById('filter').addEventListener('input', (e) => {
  currentFilter = e.target.value.toLowerCase();
  applyFilter();
});

function applyFilter() {
  const rows = document.querySelectorAll('#tree .row');
  if (!currentFilter) {
    rows.forEach(r => r.classList.remove('hidden'));
    return;
  }
  rows.forEach(r => {
    const isFile = r.classList.contains('file');
    const matches = r.dataset.lower.includes(currentFilter);
    if (isFile) {
      r.classList.toggle('hidden', !matches);
    } else {
      // Dir visible if any descendant file matches
      const li = r.closest('li');
      const childMatch = li.querySelector('.row.file:not(.hidden)');
      // We need to evaluate after files are toggled — second pass
      r._dir = li;
    }
  });
  // second pass for dirs
  document.querySelectorAll('#tree .row.dir').forEach(r => {
    const li = r._dir;
    if (!li) return;
    const visibleFiles = Array.from(li.querySelectorAll('.row.file')).filter(f => !f.classList.contains('hidden'));
    const selfMatch = r.dataset.lower.includes(currentFilter);
    r.classList.toggle('hidden', visibleFiles.length === 0 && !selfMatch);
    // auto-expand
    const ul = li.querySelector(':scope > ul');
    if (ul && visibleFiles.length > 0) ul.style.display = '';
  });
}

// ─── File rendering ────────────────────────────────────────────────────────
async function renderFile(file, path) {
  const e = ext(file.name);
  const content = document.getElementById('content');
  currentPath = path;
  currentText = null;
  syncGithubButton();
  syncToggleButton();

  const header = `<div class="path-bar">📍 <span class="name">${escapeHtml(path)}</span> &nbsp; ${(file.size/1024).toFixed(1)} KB</div>`;

  if (IMAGE_EXTS.has(e)) {
    const url = URL.createObjectURL(file);
    content.innerHTML = `<div class="viewer">${header}<img src="${url}" alt="${escapeHtml(file.name)}"></div>`;
    return;
  }
  if (VIDEO_EXTS.has(e)) {
    const url = URL.createObjectURL(file);
    content.innerHTML = `<div class="viewer">${header}<video controls src="${url}"></video></div>`;
    return;
  }
  if (AUDIO_EXTS.has(e)) {
    const url = URL.createObjectURL(file);
    content.innerHTML = `<div class="viewer">${header}<audio controls src="${url}" style="width:100%"></audio></div>`;
    return;
  }
  if (PDF_EXTS.has(e)) {
    const url = URL.createObjectURL(file);
    content.innerHTML = `<div class="viewer">${header}<iframe src="${url}"></iframe></div>`;
    return;
  }

  // Text-like
  if (file.size > TEXT_SIZE_LIMIT) {
    content.innerHTML = `<div class="viewer">${header}
      <div class="empty"><div>File too large to render (${(file.size/1024/1024).toFixed(1)} MB)</div>
      <div class="hint">Limit: ${TEXT_SIZE_LIMIT/1024/1024} MB</div></div></div>`;
    return;
  }

  let text;
  try {
    text = await file.text();
  } catch (err) {
    showError(err);
    return;
  }
  currentText = text;

  // Source mode: line-numbered view with hover gutter for review comments.
  // Available whenever we know the GitHub context (PR mode).
  if (viewMode === 'source' && serverContext && serverContext.github) {
    content.innerHTML = `<div class="viewer">${header}${renderSourceView(text, path)}</div>`;
    wireSourceView(content, path);
    return;
  }

  if (e === 'md' || e === 'markdown' || e === 'mdx') {
    // breaks: true treats single newlines as <br>, the way GitHub renders PR
    // and comment markdown — keeps multi-line content readable.
    const html = marked.parse(text, { breaks: true, mangle: false, headerIds: false });
    content.innerHTML = `<div class="viewer">${header}<div class="markdown">${html}</div></div>`;
    decorateMarkdown(content, path, text);
    return;
  }

  if (e === 'html' || e === 'htm') {
    // Render in sandboxed iframe so JS doesn't escape; offer raw view too.
    const blob = new Blob([text], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    content.innerHTML = `<div class="viewer">${header}
      <iframe sandbox="allow-scripts allow-same-origin" src="${url}"></iframe>
      <details style="margin-top:10px;"><summary style="cursor:pointer;color:var(--muted);">View raw HTML source</summary>
      <pre><code class="language-markup">${escapeHtml(text)}</code></pre></details></div>`;
    Prism.highlightAllUnder(content);
    return;
  }

  // Default: highlighted code block
  const lang = LANG_BY_EXT[e] || (TEXT_EXTS.has(e) || !e ? 'none' : null);
  if (lang === null) {
    // unknown binary — offer download
    const url = URL.createObjectURL(file);
    content.innerHTML = `<div class="viewer">${header}
      <div class="empty"><div>Binary file (${e || 'no extension'})</div>
      <div class="hint">Cannot render. <a href="${url}" download="${file.name}" style="color:var(--accent);">Download</a> instead.</div></div></div>`;
    return;
  }

  const langClass = lang === 'none' ? '' : `language-${lang}`;
  content.innerHTML = `<div class="viewer">${header}<pre><code class="${langClass}">${escapeHtml(text)}</code></pre></div>`;
  if (lang !== 'none') Prism.highlightAllUnder(content);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}


// ─── Markdown post-processing ──────────────────────────────────────────────
function decorateMarkdown(content, path, source) {
  const viewer = content.querySelector('.viewer');
  const md = content.querySelector('.markdown');
  if (!md) return;
  assignHeadingIds(md);
  jiraAutoLink(md);
  // Build the TOC before injecting comment buttons — otherwise h.textContent
  // would slurp in the button's 💬 glyph and the TOC entries would all carry it.
  buildToc(md, viewer);
  let inlineMapped = false;
  if (source && serverContext && serverContext.github && serverContext.github.commentableLines) {
    annotateMarkdownLines(md, source);
    inlineMapped = distributeReviewCommentsInline(md, path);
    addBlockCommentButtons(md, path);
  }
  if (!inlineMapped) appendReviewComments(md, path);
}

function annotateMarkdownLines(md, source) {
  // Pass 1 — token-based annotation for top-level blocks. Authoritative
  // line ranges since they come straight from the lexer.
  const tokens = marked.lexer(source);
  const blocks = [];  // {startLine, endLine}
  let pos = 0;        // 0-indexed line cursor through the source
  for (const t of tokens) {
    const newlines = (t.raw && (t.raw.match(/\n/g) || []).length) || 0;
    if (t.type === 'space') { pos += newlines; continue; }
    blocks.push({ startLine: pos + 1, endLine: pos + Math.max(newlines, 1) });
    pos += newlines;
  }
  const children = md.children;
  for (let i = 0; i < Math.min(children.length, blocks.length); i++) {
    children[i].dataset.mdLine = blocks[i].startLine;
    children[i].dataset.mdEndLine = blocks[i].endLine;
  }

  // Pass 2 — DOM-based annotation for inner blocks (list items, nested
  // headings, paragraphs, blockquotes). These don't appear at the top level
  // when the file is mostly one big nested list, but each one corresponds
  // to a real source line. Match by leading text.
  annotateInnerBlocksByText(md, source);
}

function annotateInnerBlocksByText(md, source) {
  const lines = source.split('\n').map(l => l.trim());
  function firstTextSnippet(el) {
    // First chunk of visible text before any nested block-level element /
    // <br>. Capped to 100 chars so we don't try to match an entire
    // wrapped paragraph.
    const STOP = new Set(['BR','UL','OL','BLOCKQUOTE','TABLE','PRE','P','LI',
                          'H1','H2','H3','H4','H5','H6','HR']);
    const parts = [];
    let stopped = false;
    function walk(node) {
      if (stopped) return;
      if (node.nodeType === 3) { parts.push(node.nodeValue); return; }
      if (node.nodeType !== 1) return;
      if (STOP.has(node.tagName)) { stopped = true; return; }
      for (const child of node.childNodes) walk(child);
    }
    for (const child of el.childNodes) {
      if (stopped) break;
      walk(child);
    }
    return parts.join('').replace(/\s+/g, ' ').trim().slice(0, 100);
  }

  // Walk in document order, advancing a cursor through source so the same
  // line isn't claimed twice and we never bind backwards.
  let cursor = 0;
  md.querySelectorAll('li, p, h1, h2, h3, h4, h5, h6, blockquote').forEach(el => {
    if (el.dataset.mdLine) return;  // already annotated by token pass
    const snippet = firstTextSnippet(el);
    if (snippet.length < 4) return;
    for (let i = cursor; i < lines.length; i++) {
      if (lines[i].length >= 4 && lines[i].includes(snippet)) {
        el.dataset.mdLine = i + 1;
        el.dataset.mdEndLine = i + 1;
        cursor = i + 1;
        return;
      }
    }
    // Fallback: relax the match — the source line is probably truncated
    // (tags / formatting eaten); try a startsWith on the first few words.
    const head = snippet.split(' ').slice(0, 4).join(' ');
    if (head.length < 8) return;
    for (let i = cursor; i < lines.length; i++) {
      if (lines[i].includes(head)) {
        el.dataset.mdLine = i + 1;
        el.dataset.mdEndLine = i + 1;
        cursor = i + 1;
        return;
      }
    }
  });
}

function firstCommentableLineInRange(path, start, end) {
  const ctx = serverContext.github || {};
  const set = new Set((ctx.commentableLines && ctx.commentableLines[path]) || []);
  for (let l = start; l <= end; l++) if (set.has(l)) return l;
  return null;
}

function addBlockCommentButtons(md, path) {
  md.querySelectorAll('[data-md-line]').forEach(el => {
    // Only attach the button to leaf annotated elements — if an element
    // has annotated descendants (e.g. a top-level <ul> wrapping <li>s
    // that each carry their own data-md-line), let the descendants own
    // the buttons. Otherwise we end up stacking 💬 on every layer.
    if (el.querySelector('[data-md-line]')) return;
    const start = Number(el.dataset.mdLine);
    const end = Number(el.dataset.mdEndLine || start);
    const target = firstCommentableLineInRange(path, start, end);
    if (target === null) return;
    const btn = document.createElement('button');
    btn.className = 'md-add-comment';
    btn.type = 'button';
    btn.textContent = '💬';
    btn.title = `Comment on line ${target}`;
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      e.preventDefault();
      openInlineComposer(el, path, target);
    });
    el.appendChild(btn);
  });
}

function distributeReviewCommentsInline(md, path) {
  const comments = (serverContext.prReviewComments || {})[path] || [];
  if (!comments.length) return false;
  const blocks = Array.from(md.querySelectorAll('[data-md-line]'));
  if (!blocks.length) return false;
  let placed = 0;
  for (const c of comments) {
    if (!c.line) continue;
    // Find the block whose line range contains this comment line.
    const block = blocks.find(b => {
      const s = Number(b.dataset.mdLine);
      const e = Number(b.dataset.mdEndLine || s);
      return c.line >= s && c.line <= e;
    }) || blocks[blocks.length - 1];
    appendInlineComment(block, c);
    placed++;
  }
  return placed > 0;
}

function appendInlineComment(block, comment) {
  let extras = block.nextElementSibling;
  if (!extras || !extras.classList.contains('md-block-extras')) {
    extras = document.createElement('div');
    extras.className = 'md-block-extras';
    block.parentNode.insertBefore(extras, block.nextSibling);
  }
  extras.insertAdjacentHTML('beforeend', commentCardHtml(comment));
}

function openInlineComposer(blockEl, path, lineNum) {
  let extras = blockEl.nextElementSibling;
  if (!extras || !extras.classList.contains('md-block-extras')) {
    extras = document.createElement('div');
    extras.className = 'md-block-extras';
    blockEl.parentNode.insertBefore(extras, blockEl.nextSibling);
  }
  if (extras.querySelector('.composer')) {
    extras.querySelector('textarea').focus();
    return;
  }
  const composer = createComposerEl(path, lineNum, (newComment) => {
    composer.outerHTML = commentCardHtml(newComment);
  });
  extras.appendChild(composer);
  composer.querySelector('textarea').focus();
}

function slugify(text) {
  return String(text).toLowerCase().trim()
    .replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').slice(0, 80) || 'h';
}

function assignHeadingIds(md) {
  const seen = new Map();
  md.querySelectorAll('h1, h2, h3, h4').forEach(h => {
    let id = slugify(h.textContent);
    const n = (seen.get(id) || 0) + 1;
    seen.set(id, n);
    if (n > 1) id += '-' + n;
    h.id = id;
  });
}

function jiraAutoLink(md) {
  // Walk text nodes; skip anything inside <pre>, <code>, or existing <a>.
  const walker = document.createTreeWalker(md, NodeFilter.SHOW_TEXT, {
    acceptNode(n) {
      let p = n.parentNode;
      while (p && p !== md) {
        const tag = p.tagName;
        if (tag === 'CODE' || tag === 'PRE' || tag === 'A') return NodeFilter.FILTER_REJECT;
        p = p.parentNode;
      }
      return JIRA_RE.test(n.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
    },
  });
  // RegExp.test bumps lastIndex on /g — reset between matches per node.
  const targets = [];
  let n;
  while ((n = walker.nextNode())) targets.push(n);
  for (const node of targets) {
    JIRA_RE.lastIndex = 0;
    const text = node.nodeValue;
    const frag = document.createDocumentFragment();
    let last = 0;
    let m;
    while ((m = JIRA_RE.exec(text))) {
      if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      const a = document.createElement('a');
      a.href = JIRA_BASE + m[1];
      a.target = '_blank';
      a.rel = 'noopener';
      a.textContent = m[1];
      frag.appendChild(a);
      last = m.index + m[1].length;
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag, node);
  }
}

function appendReviewComments(md, path) {
  const map = serverContext && serverContext.prReviewComments;
  if (!map) return;
  const comments = map[path];
  if (!comments || !comments.length) return;
  const sec = document.createElement('div');
  sec.className = 'review-comments';
  sec.innerHTML = `<h3>💬 Review comments (${comments.length})</h3>` +
    comments.map(c => {
      const meta = `<a href="${c.htmlUrl || '#'}" target="_blank" rel="noopener">@${escapeHtml(c.user)}</a>` +
        (c.line ? ` on line ${c.line}` : '') +
        (c.createdAt ? ` · ${escapeHtml(c.createdAt)}` : '');
      return `<div class="rc"><div class="rc-meta">${meta}</div>` +
             `<div class="rc-body">${escapeHtml(c.body)}</div></div>`;
    }).join('');
  md.appendChild(sec);
}

function buildToc(md, viewer) {
  const headings = md.querySelectorAll('h1, h2, h3, h4');
  if (headings.length < 3) return;  // not worth the chrome
  const toc = document.createElement('nav');
  toc.className = 'toc';
  toc.innerHTML = '<div class="toc-head">On this page</div>';
  headings.forEach(h => {
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    a.className = 'level-' + h.tagName.slice(1);
    a.addEventListener('click', (e) => {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    toc.appendChild(a);
  });
  viewer.appendChild(toc);
  viewer.classList.add('has-toc');
}

// ─── Source view + line-anchored review comment posting ───────────────────
function renderSourceView(text, path) {
  const ctx = serverContext.github || {};
  const commentable = new Set((ctx.commentableLines && ctx.commentableLines[path]) || []);
  const comments = (serverContext.prReviewComments || {})[path] || [];
  const commentsByLine = new Map();
  for (const c of comments) {
    if (!c.line) continue;
    if (!commentsByLine.has(c.line)) commentsByLine.set(c.line, []);
    commentsByLine.get(c.line).push(c);
  }
  const lines = text.split('\n');
  const html = ['<pre class="source-view">'];
  for (let i = 0; i < lines.length; i++) {
    const lineNum = i + 1;
    const isCommentable = commentable.has(lineNum);
    html.push(
      `<div class="src-line${isCommentable ? ' commentable' : ''}" data-line="${lineNum}">` +
        `<span class="ln">${lineNum}</span>` +
        `<span class="add-comment" title="Add review comment on line ${lineNum}">+</span>` +
        `<span class="src-content">${escapeHtml(lines[i]) || '&nbsp;'}</span>` +
      `</div>`
    );
    const lc = commentsByLine.get(lineNum);
    if (lc) {
      html.push('<div class="src-extras" data-extras-for="' + lineNum + '">');
      for (const c of lc) html.push(commentCardHtml(c));
      html.push('</div>');
    }
  }
  html.push('</pre>');
  if (!commentable.size) {
    html.unshift(
      `<div class="path-bar" style="border-bottom:none;padding-bottom:0;color:var(--muted);">` +
      `Note: this file is not part of the PR diff, so review comments cannot be added inline.</div>`
    );
  }
  return html.join('');
}

function commentCardHtml(c) {
  const linkOpen = c.htmlUrl ? `<a href="${escapeHtml(c.htmlUrl)}" target="_blank" rel="noopener">` : '';
  const linkClose = c.htmlUrl ? '</a>' : '';
  return `<div class="src-comment-card">` +
    `<div class="meta">${linkOpen}@${escapeHtml(c.user || '?')}${linkClose}` +
    (c.line ? ` · line ${c.line}` : '') +
    (c.createdAt ? ` · ${escapeHtml(c.createdAt)}` : '') +
    `</div>` +
    `<div class="body">${escapeHtml(c.body || '')}</div>` +
  `</div>`;
}

function wireSourceView(content, path) {
  const ctx = serverContext.github || {};
  const commentable = new Set((ctx.commentableLines && ctx.commentableLines[path]) || []);
  content.querySelectorAll('.src-line.commentable').forEach(line => {
    const lineNum = Number(line.dataset.line);
    const onClick = (e) => {
      e.stopPropagation();
      if (!commentable.has(lineNum)) return;
      openComposer(line, path, lineNum);
    };
    line.querySelector('.add-comment').addEventListener('click', onClick);
    line.querySelector('.ln').addEventListener('click', onClick);
  });
}

function openComposer(lineRow, path, lineNum) {
  let extras = lineRow.nextElementSibling;
  if (!extras || !extras.classList.contains('src-extras') || extras.dataset.extrasFor !== String(lineNum)) {
    extras = document.createElement('div');
    extras.className = 'src-extras';
    extras.dataset.extrasFor = String(lineNum);
    lineRow.parentNode.insertBefore(extras, lineRow.nextSibling);
  }
  if (extras.querySelector('.composer')) {
    extras.querySelector('textarea').focus();
    return;
  }
  const composer = createComposerEl(path, lineNum, (newComment) => {
    composer.outerHTML = commentCardHtml(newComment);
  });
  extras.appendChild(composer);
  composer.querySelector('textarea').focus();
}

function createComposerEl(path, lineNum, onPosted) {
  const composer = document.createElement('div');
  composer.className = 'composer';
  composer.innerHTML =
    `<textarea placeholder="Comment on line ${lineNum}…"></textarea>` +
    `<div class="actions"><span class="err"></span>` +
      `<button class="cancel" type="button">Cancel</button>` +
      `<button class="primary submit" type="button">Comment</button>` +
    `</div>`;
  const ta = composer.querySelector('textarea');
  const errEl = composer.querySelector('.err');
  const submitBtn = composer.querySelector('.submit');
  composer.querySelector('.cancel').addEventListener('click', () => composer.remove());
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { composer.remove(); }
    else if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { submitBtn.click(); }
  });
  submitBtn.addEventListener('click', async () => {
    const body = ta.value.trim();
    if (!body) { errEl.textContent = 'comment body required'; return; }
    submitBtn.disabled = true; errEl.textContent = '';
    try {
      const res = await fetch('/__mdbrowse__/post-comment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path, line: lineNum, body }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.ok) {
        errEl.textContent = data.error || ('post failed: ' + res.status);
        submitBtn.disabled = false;
        return;
      }
      if (!serverContext.prReviewComments[path]) serverContext.prReviewComments[path] = [];
      serverContext.prReviewComments[path].push(data.comment);
      onPosted(data.comment);
    } catch (err) {
      errEl.textContent = err.message || String(err);
      submitBtn.disabled = false;
    }
  });
  return composer;
}

// ─── Load form (PR / repo / path) ──────────────────────────────────────────
let isLoading = false;

function showLoadingScreen(spec, stage, footnote) {
  document.getElementById('content').innerHTML =
    `<div class="loading-screen">
      <div class="spinner"></div>
      <div class="title">Loading <code>${escapeHtml(spec)}</code></div>
      <div class="stage"><strong>${escapeHtml(stage)}</strong></div>
      ${footnote ? `<div class="footnote">${escapeHtml(footnote)}</div>` : ''}
    </div>`;
}

function describeLoad(spec) {
  // Best-effort detection of what kind of work the server is about to do,
  // so the loading screen can hint at how long to expect.
  if (/#\d+/.test(spec) || /\/pull\/\d+/.test(spec)) {
    return {
      stage: 'Fetching PR metadata, cloning the repo, and checking out the branch',
      foot: 'Typically 5–20s. First-time clones of big repos can take longer.',
    };
  }
  if (/^https?:\/\/github\.com\//.test(spec) || /^[\w.-]+\/[\w.-]+$/.test(spec) || /^git@github\.com:/.test(spec)) {
    return {
      stage: 'Shallow-cloning the repo',
      foot: 'Typically 3–10s.',
    };
  }
  return { stage: 'Indexing the directory', foot: '' };
}

document.getElementById('load-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (isLoading) return;
  const input = document.getElementById('load-input');
  const btn = document.getElementById('load-btn');
  const spec = input.value.trim();
  if (!spec) return;
  const prev = btn.textContent;
  isLoading = true;
  btn.disabled = true; btn.textContent = 'Loading…';
  input.disabled = true;

  // Reset per-file viewer state immediately and show the loading screen.
  currentPath = null; selectedRow = null;
  clearNavHistory();
  const { stage, foot } = describeLoad(spec);
  showLoadingScreen(spec, stage, foot);
  document.getElementById('root-name').textContent = '⏳ Loading ' + spec;

  try {
    const res = await fetch('/__mdbrowse__/load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ spec }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) {
      showError(new Error(data.error || ('load failed: ' + res.status)));
      return;
    }
    input.value = '';
    await loadServedTree({ silent: true });
  } catch (err) {
    showError(err);
  } finally {
    isLoading = false;
    btn.disabled = false; btn.textContent = prev;
    input.disabled = false;
  }
});

// ─── File navigation history (browser-style back/forward) ─────────────────
function pushNavHistory(path) {
  if (!path) return;
  if (navPos >= 0 && navHistory[navPos] === path) return;
  navHistory = navHistory.slice(0, navPos + 1);
  navHistory.push(path);
  navPos = navHistory.length - 1;
  syncNavButtons();
}

function navBack()    { if (navPos > 0)                       goToHistoryEntry(navPos - 1); }
function navForward() { if (navPos < navHistory.length - 1)   goToHistoryEntry(navPos + 1); }

function goToHistoryEntry(targetPos) {
  const path = navHistory[targetPos];
  if (!path) return;
  const row = document.querySelector(`#tree .row.file[data-served-path="${cssEscape(path)}"]`);
  if (!row) return;
  navPos = targetPos;
  isNavigating = true;
  try { row.click(); } finally { isNavigating = false; }
  syncNavButtons();
}

function cssEscape(s) {
  // Minimal escape for use inside an attribute selector — quotes only.
  return String(s).replace(/(["\\])/g, '\\$1');
}

function syncNavButtons() {
  document.getElementById('nav-back').disabled = !(navPos > 0);
  document.getElementById('nav-forward').disabled = !(navPos < navHistory.length - 1);
}

function clearNavHistory() {
  navHistory = [];
  navPos = -1;
  syncNavButtons();
}

document.getElementById('nav-back').addEventListener('click', navBack);
document.getElementById('nav-forward').addEventListener('click', navForward);

// Keyboard: ⌘[ / ⌘] (Mac) and Alt+Left / Alt+Right (cross-platform).
window.addEventListener('keydown', (e) => {
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA' || (e.target && e.target.isContentEditable)) return;
  if ((e.metaKey || e.ctrlKey) && !e.shiftKey && !e.altKey && e.key === '[') {
    e.preventDefault(); navBack(); return;
  }
  if ((e.metaKey || e.ctrlKey) && !e.shiftKey && !e.altKey && e.key === ']') {
    e.preventDefault(); navForward(); return;
  }
  if (e.altKey && e.key === 'ArrowLeft')  { e.preventDefault(); navBack();    return; }
  if (e.altKey && e.key === 'ArrowRight') { e.preventDefault(); navForward(); return; }
});

// ─── Width toggle (Narrow → Wide → Full) ──────────────────────────────────
const WIDTHS = ['narrow', 'wide', 'full'];
const WIDTH_LABEL = { narrow: '↔ Narrow', wide: '↔ Wide', full: '↔ Full' };
let currentWidth = (localStorage.getItem('mdbrowse:width') || 'wide');
if (!WIDTHS.includes(currentWidth)) currentWidth = 'wide';
applyWidth();

document.getElementById('toggle-width').addEventListener('click', () => {
  const i = WIDTHS.indexOf(currentWidth);
  currentWidth = WIDTHS[(i + 1) % WIDTHS.length];
  localStorage.setItem('mdbrowse:width', currentWidth);
  applyWidth();
});

function applyWidth() {
  const body = document.body;
  WIDTHS.forEach(w => body.classList.remove('width-' + w));
  body.classList.add('width-' + currentWidth);
  document.getElementById('toggle-width').textContent = WIDTH_LABEL[currentWidth];
}

// ─── Mode toggle (Rendered ↔ Source) ───────────────────────────────────────
document.getElementById('toggle-mode').addEventListener('click', async () => {
  viewMode = viewMode === 'source' ? 'rendered' : 'source';
  syncToggleButton();
  // Re-render the current file in the new mode if there is one.
  if (currentPath && selectedRow) selectedRow.click();
});

function syncToggleButton() {
  const btn = document.getElementById('toggle-mode');
  const review = document.getElementById('submit-review');
  const isPR = serverContext && serverContext.github && serverContext.github.prNumber;
  if (!serverContext || !serverContext.github) {
    btn.hidden = true;
    review.hidden = true;
    return;
  }

  btn.textContent = viewMode === 'source' ? '📖 Rendered view' : '💬 Comment mode';
  review.hidden = !isPR;
}

// ─── Submit-review modal (PR mode) ─────────────────────────────────────────
document.getElementById('submit-review').addEventListener('click', () => {
  if (!serverContext || !serverContext.github || !serverContext.github.prNumber) return;
  openSubmitReviewModal();
});

function openSubmitReviewModal() {
  const ctx = serverContext.github;
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true">
      <div class="head">
        <div class="title">Submit review on ${escapeHtml(ctx.owner + '/' + ctx.repo + '#' + ctx.prNumber)}</div>
        <button class="close" type="button" aria-label="Close">✕</button>
      </div>
      <div class="body">
        <label for="review-body">Review summary (optional for Approve, required for Request changes / Comment)</label>
        <textarea id="review-body" placeholder="What did you check? Any blockers?"></textarea>
      </div>
      <div class="actions">
        <span class="err"></span>
        <button class="cancel" type="button">Cancel</button>
        <button class="comment" type="button" data-event="COMMENT">💬 Comment</button>
        <button class="request-changes" type="button" data-event="REQUEST_CHANGES">⛔ Request changes</button>
        <button class="approve" type="button" data-event="APPROVE">✅ Approve</button>
      </div>
    </div>`;
  document.body.appendChild(backdrop);
  const ta = backdrop.querySelector('textarea');
  const errEl = backdrop.querySelector('.err');
  const allBtns = backdrop.querySelectorAll('.actions button');
  ta.focus();

  function close() { backdrop.remove(); window.removeEventListener('keydown', onEsc); }
  function onEsc(e) { if (e.key === 'Escape') close(); }
  window.addEventListener('keydown', onEsc);
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) close(); });
  backdrop.querySelector('.close').addEventListener('click', close);
  backdrop.querySelector('.cancel').addEventListener('click', close);

  backdrop.querySelectorAll('button[data-event]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const event = btn.dataset.event;
      const reviewBody = ta.value.trim();
      if (event !== 'APPROVE' && !reviewBody) {
        errEl.textContent = 'A review summary is required for ' +
          (event === 'COMMENT' ? 'Comment' : 'Request changes') + '.';
        ta.focus();
        return;
      }
      // Confirm Approve / Request changes — these notify and visibly mutate the PR.
      if (event === 'APPROVE' && !confirm('Approve this PR? This sends an approval notification on GitHub.')) return;
      if (event === 'REQUEST_CHANGES' && !confirm('Request changes on this PR? This blocks the PR and notifies the author.')) return;

      allBtns.forEach(b => b.disabled = true);
      errEl.textContent = '';
      try {
        const res = await fetch('/__mdbrowse__/submit-review', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ event, body: reviewBody }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          errEl.textContent = data.error || ('submit failed: ' + res.status);
          allBtns.forEach(b => b.disabled = false);
          return;
        }
        close();
        // Soft confirmation banner.
        const note = document.createElement('div');
        note.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:10px 16px;border-radius:6px;font-size:13px;z-index:200;box-shadow:0 6px 24px rgba(0,0,0,0.4);';
        note.innerHTML = `Review submitted (${escapeHtml(event)}). ` +
          (data.htmlUrl ? `<a href="${escapeHtml(data.htmlUrl)}" target="_blank" rel="noopener" style="color:#fff;text-decoration:underline;">View on GitHub</a>` : '');
        document.body.appendChild(note);
        setTimeout(() => note.remove(), 6000);
      } catch (err) {
        errEl.textContent = err.message || String(err);
        allBtns.forEach(b => b.disabled = false);
      }
    });
  });
}

// ─── Open-on-GitHub toolbar button ─────────────────────────────────────────
function syncGithubButton() {
  const btn = document.getElementById('open-on-github');
  const ctx = serverContext && serverContext.github;
  if (!ctx || !currentPath) { btn.hidden = true; return; }

  btn.hidden = false;
  btn.onclick = async () => {
    let url;
    if (ctx.prUrl) {
      // PR mode: jump to the PR's "Files changed" tab anchored at this file's
      // diff. The synthesised _PR.md is virtual, so just open the PR overview.
      if (currentPath === '_PR.md') {
        url = ctx.prUrl;
      } else {
        const hash = await sha256Hex(currentPath);
        url = `${ctx.prUrl}/files#diff-${hash}`;
      }
    } else if (ctx.baseBlobUrl) {
      // Plain repo / folder mode: file at the current branch.
      url = `${ctx.baseBlobUrl}/${currentPath}`;
    } else {
      return;
    }
    window.open(url, '_blank', 'noopener');
  };
}

async function sha256Hex(text) {
  const buf = new TextEncoder().encode(text);
  const digest = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(digest))
    .map(b => b.toString(16).padStart(2, '0')).join('');
}

// ─── Keyboard nav ──────────────────────────────────────────────────────────
window.addEventListener('keydown', (e) => {
  // Ignore when typing in an input/textarea or with modifiers.
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable) {
    if (e.key === 'Escape') e.target.blur();
    return;
  }
  if (e.metaKey || e.ctrlKey || e.altKey) return;

  if (e.key === '/') {
    e.preventDefault();
    document.getElementById('filter').focus();
    return;
  }
  if (e.key === '?') {
    e.preventDefault();
    document.getElementById('content-search').focus();
    return;
  }
  if (e.key === 'g' && !e.shiftKey) {
    const btn = document.getElementById('open-on-github');
    if (!btn.hidden) btn.click();
    return;
  }
  if (e.key === 'r' && !e.shiftKey) {
    const btn = document.getElementById('refresh');
    if (!btn.hidden) btn.click();
    return;
  }
  if (e.key === 'j' || e.key === 'ArrowDown') { e.preventDefault(); moveFile(1); }
  else if (e.key === 'k' || e.key === 'ArrowUp') { e.preventDefault(); moveFile(-1); }
});

function moveFile(delta) {
  const visible = Array.from(document.querySelectorAll('#tree .row.file'))
    .filter(r => !r.classList.contains('hidden'));
  if (!visible.length) return;
  let idx = visible.indexOf(selectedRow);
  if (idx < 0) idx = delta > 0 ? -1 : visible.length;
  const next = visible[(idx + delta + visible.length) % visible.length];
  if (next) {
    next.click();
    next.scrollIntoView({ block: 'nearest' });
  }
}

function showError(err) {
  document.getElementById('content').innerHTML =
    `<div class="viewer"><div class="empty"><div>Error</div><div class="hint">${escapeHtml(err.message || String(err))}</div></div></div>`;
}

// ─── Open folder ───────────────────────────────────────────────────────────
document.getElementById('open-folder').addEventListener('click', async () => {
  if (!window.showDirectoryPicker) {
    alert('Folder open requires Chrome or Edge (File System Access API). For other browsers use "Open File" for individual files.');
    return;
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'read' });
    rootHandle = handle;
    document.getElementById('root-name').textContent = '📂 ' + handle.name;
    document.getElementById('content').innerHTML =
      `<div class="empty"><div style="font-size:48px;">⏳</div><div>Indexing folder…</div></div>`;
    fileTree = await buildTree(handle);
    refreshTree();
    document.getElementById('content').innerHTML =
      `<div class="empty"><div style="font-size:48px;">📂</div><div>${escapeHtml(handle.name)}</div>
      <div class="hint">Click any file in the tree to view it. Toggle "Markdown only" off to see all files.</div></div>`;
  } catch (err) {
    if (err.name !== 'AbortError') showError(err);
  }
});

// ─── Content search (served-folder mode only) ─────────────────────────────
let isServed = false;
let lastSearchSeq = 0;
let searchDebounce = null;

document.getElementById('content-search').addEventListener('input', (e) => {
  const q = e.target.value.trim();
  clearTimeout(searchDebounce);
  if (!q) {
    showTree();
    return;
  }
  if (!isServed) {
    showResultsMessage('Content search is only available in served-folder mode (mdbrowse PATH).');
    return;
  }
  searchDebounce = setTimeout(() => runSearch(q), 150);
});

async function runSearch(q) {
  const seq = ++lastSearchSeq;
  showResultsMessage('Searching…');
  try {
    const url = '/__mdbrowse__/search?q=' + encodeURIComponent(q);
    const data = await fetch(url).then(r => r.json());
    if (seq !== lastSearchSeq) return;  // a newer search has started
    renderResults(data.query, data.results);
  } catch (err) {
    if (seq === lastSearchSeq) showResultsMessage('Search failed: ' + err.message);
  }
}

function renderResults(query, results) {
  const tree = document.getElementById('tree');
  const panel = document.getElementById('results');
  tree.hidden = true;
  panel.hidden = false;
  panel.innerHTML = '';

  if (!results.length) {
    panel.innerHTML = `<div class="empty-msg">No matches for <strong>${escapeHtml(query)}</strong></div>`;
    return;
  }

  const re = new RegExp(escapeRegex(query), 'gi');
  for (const r of results) {
    const item = document.createElement('div');
    item.className = 'result';
    item.innerHTML =
      `<div><span class="path">${escapeHtml(r.path)}</span><span class="total">${r.total} hit${r.total === 1 ? '' : 's'}</span></div>` +
      r.snippets.map(s =>
        `<div class="snip"><span class="ln">${s.line}:</span>${highlight(s.text, re)}</div>`
      ).join('');
    item.addEventListener('click', () => openServedPath(r.path));
    panel.appendChild(item);
  }
}

function highlight(text, re) {
  return escapeHtml(text).replace(re, m => '<mark>' + m + '</mark>');
}
function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function showResultsMessage(msg) {
  const tree = document.getElementById('tree');
  const panel = document.getElementById('results');
  tree.hidden = true;
  panel.hidden = false;
  panel.innerHTML = `<div class="empty-msg">${escapeHtml(msg)}</div>`;
}

function showTree() {
  document.getElementById('tree').hidden = false;
  document.getElementById('results').hidden = true;
}

async function openServedPath(servedPath) {
  try {
    const resp = await fetch('/' + servedPath);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} for ${servedPath}`);
    const blob = await resp.blob();
    const name = servedPath.split('/').pop();
    const file = new File([blob], name, { type: blob.type });
    await renderFile(file, servedPath);
    if (!isNavigating) pushNavHistory(servedPath);
  } catch (err) {
    showError(err);
  }
}

// ─── Open single file ──────────────────────────────────────────────────────
document.getElementById('open-file').addEventListener('click', () => {
  document.getElementById('hidden-file').click();
});
document.getElementById('hidden-file').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('root-name').textContent = '📄 ' + file.name;
  document.getElementById('tree').innerHTML = '';
  document.getElementById('stats').textContent = '';
  await renderFile(file, file.name);
});

// ─── Refresh (served-folder mode) ──────────────────────────────────────────
document.getElementById('refresh').addEventListener('click', async () => {
  const btn = document.getElementById('refresh');
  const prev = btn.textContent;
  btn.disabled = true;
  btn.textContent = '⏳ Refreshing…';
  try {
    await loadServedTree({ silent: true });
  } finally {
    btn.disabled = false;
    btn.textContent = prev;
  }
});

// ─── Markdown-only toggle ──────────────────────────────────────────────────
document.getElementById('md-only').addEventListener('change', (e) => {
  mdOnly = e.target.checked;
  refreshTree();
});

// ─── Mermaid: re-init when markdown contains code blocks ──────────────────
mermaid.initialize({ startOnLoad: false, theme: 'dark' });

// ─── URL query-param init ──────────────────────────────────────────────────
// Honour ?mdOnly=0/1 and ?serve=1 (the latter is set by the mdbrowse CLI when
// the app is opened against a Python-served target folder; the script sends
// the file tree via /__mdbrowse__/tree.json so we skip the folder picker).
(function initFromQuery() {
  const params = new URLSearchParams(location.search);
  if (params.get('mdOnly') === '0') {
    mdOnly = false;
    document.getElementById('md-only').checked = false;
  } else if (params.get('mdOnly') === '1') {
    mdOnly = true;
    document.getElementById('md-only').checked = true;
  }
  if (params.get('serve') === '1') {
    loadServedTree();
  }
})();

async function loadServedTree({ silent = false } = {}) {
  try {
    isServed = true;
    document.getElementById('refresh').hidden = false;
    if (!silent) {
      document.getElementById('content').innerHTML =
        `<div class="loading-screen"><div class="spinner"></div>
          <div class="title">Connecting to server…</div></div>`;
    }
    const meta = await fetch('/__mdbrowse__/tree.json', { cache: 'no-store' }).then(r => {
      if (!r.ok) throw new Error('tree.json fetch failed: ' + r.status);
      return r.json();
    });
    serverContext = { github: meta.github || null, prReviewComments: meta.prReviewComments || {} };
    fileTree = buildTreeFromPaths(meta.root, meta.files);
    const loaded = meta.loaded !== false;
    document.getElementById('root-name').textContent = (loaded ? '🌐 ' : '✨ ') + meta.root;
    refreshTree();
    syncGithubButton();
    syncToggleButton();
    // Set the welcome / idle state if no file is currently open. This
    // replaces the loading-screen spinner from a fresh load, but leaves
    // a viewer alone when this is just a refresh of an open file.
    if (!currentPath) {
      if (!loaded) {
        document.getElementById('content').innerHTML =
          `<div class="empty"><div style="font-size:48px;">📥</div><div>Nothing loaded yet</div>
          <div class="hint">Paste a PR URL, <code>owner/repo</code>, <code>owner/repo#N</code>, or a local path into the <strong>Load</strong> input above and hit Enter.</div></div>`;
      } else {
        document.getElementById('content').innerHTML =
          `<div class="empty"><div style="font-size:48px;">📂</div><div>${escapeHtml(meta.root)}</div>
          <div class="hint">Click any file to view. Toggle "Markdown only" off to see all files.</div></div>`;
      }
    }
  } catch (err) {
    showError(err);
  }
}

// Build a tree node graph from a flat list of relative file paths.
// Each leaf carries `servedPath` so click handlers know to fetch via HTTP.
function buildTreeFromPaths(rootName, paths) {
  const root = { name: rootName, kind: 'directory', children: [] };
  for (const p of paths) {
    const parts = p.split('/');
    let cur = root;
    for (let i = 0; i < parts.length; i++) {
      const part = parts[i];
      const isFile = i === parts.length - 1;
      if (isFile) {
        cur.children.push({ name: part, kind: 'file', servedPath: p });
      } else {
        let dir = cur.children.find(c => c.kind === 'directory' && c.name === part);
        if (!dir) {
          dir = { name: part, kind: 'directory', children: [] };
          cur.children.push(dir);
        }
        cur = dir;
      }
    }
  }
  function sortRec(node) {
    node.children.sort((a, b) => {
      if (a.kind !== b.kind) return a.kind === 'directory' ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
    for (const c of node.children) if (c.kind === 'directory') sortRec(c);
  }
  sortRec(root);
  return root;
}
